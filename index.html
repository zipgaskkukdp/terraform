<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>niha5ma 게시판 - 이미지 업로드</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 0 auto; padding: 40px; background: #f0f2f5; color: #333; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); margin-bottom: 30px; }
        h1 { color: #1a73e8; margin-top: 0; border-bottom: 2px solid #e8f0fe; padding-bottom: 10px; }
        h2 { font-size: 1.2rem; margin-bottom: 15px; }
        
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        
        .btn-primary { background: #1a73e8; color: white; }
        .btn-secondary { background: #6c757d; color: white; margin-left: 5px; }
        .btn-danger { background: #dc3545; color: white; width: 100%; margin-top: 15px; }
        
        #auth-section { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
        #auth-section input { width: 150px; margin: 0; }
        #user-info { display: none; align-items: center; gap: 15px; margin-bottom: 20px; font-weight: bold; color: #555; }
        /* 탈퇴 버튼 전용 스타일 */
.btn-withdraw {
    background-color: #dc3545;
    color: white;
    border: none;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    margin-left: 10px;
}

.btn-withdraw:hover {
    background-color: #c82333;
}
	table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { border-bottom: 1px solid #eee; padding: 15px; text-align: left; }
        tr:hover { background: #f8fbff; cursor: pointer; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content {
    background-color: #fefefe;
    margin: 3% auto; /* 화면 위쪽 여백을 줄여서 더 넓게 보이게 함 */
    padding: 30px;   /* 내부 여백 확대 */
    border: 1px solid #888;
    width: 80%;      /* 기존보다 가로 폭을 넓게 설정 (예: 50% -> 80%) */
    max-width: 900px; /* 너무 커지지 않게 최대 너비 제한 */
    border-radius: 15px; /* 모서리를 둥글게 */
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    max-height: 85vh;
    overflow-y: auto;
}
	.close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #999; }
        
        /* 이미지 미리보기 스타일 */
       #detail-image {
    width: 100%;
    max-height: 500px; /* 이미지가 너무 길어지지 않게 조절 */
    object-fit: contain; /* 이미지 비율 유지 */
    margin: 20px 0;
}
    </style>
</head>
<body>

    <div class="card">
        <div id="auth-form">
            <h2>🔐 로그인 후 이용해주세요</h2>
            <div id="auth-section">
                <input type="text" id="login-id" placeholder="아이디">
                <input type="password" id="login-pw" placeholder="비밀번호">
                <button class="btn-primary" onclick="login()">로그인</button>
                <button class="btn-secondary" onclick="register()">회원가입</button>
            </div>
        </div>
        <div id="user-info">
            <span id="welcome-msg"></span>님, 환영합니다! 
            <button class="btn-secondary" style="padding: 5px 12px;" onclick="logout()">로그아웃</button>
	    <button onclick="withdrawAccount()" class="btn-withdraw">회원 탈퇴</button>
        </div>
    </div>

    <div id="write-section" class="card" style="display: none;">
        <h1>📝 새 게시글 작성</h1>
        <input type="text" id="title" placeholder="제목">
        <input type="file" id="image-file" accept="image/*"> <textarea id="content" rows="4" placeholder="내용을 입력하세요"></textarea>
        <button class="btn-primary" style="width: 100%;" onclick="submitPost()">등록하기</button>
    </div>

    <div class="card">
        <h1>📋 게시글 목록</h1>
        <table>
            <thead>
                <tr><th>ID</th><th>제목</th><th>작성자</th><th>작성일</th></tr>
            </thead>
            <tbody id="post-list"></tbody>
        </table>
    </div>

    <div id="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="detail-title"></h2>
            <p id="detail-date" style="color: #999; font-size: 0.9rem;"></p>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
            <p id="detail-content" style="line-height: 1.6; white-space: pre-wrap;"></p>
            <img id="detail-image" src="" alt="첨부 이미지"> <button class="btn-danger" onclick="deletePost()">이 게시글 삭제하기</button>
        </div>
    </div>

    <script>
        let currentPostId = null;

	// 1. 회원가입 (2차 비밀번호를 팝업으로 받기)
function register() {
    const username = document.getElementById('login-id').value;
    const password = document.getElementById('login-pw').value;

    if (!username || !password) {
        return alert("아이디와 비번을 입력하세요!");
    }

    // 화면의 입력창 대신 팝업창을 띄웁니다.
    const withdraw_password = prompt("회원 탈퇴 시 사용할 2차 비밀번호를 설정해주세요.");

    if (withdraw_password === null) return; // 취소 클릭 시
    if (withdraw_password.trim() === "") {
        return alert("2차 비밀번호는 필수입니다.");
    }

    fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
            username: username, 
            password: password, 
            withdraw_password: withdraw_password 
        })
    })
    .then(res => res.ok ? alert("회원가입 성공!") : alert("오류가 발생했습니다."))
    .then(() => location.reload());
}
        // 2. 로그인 (localStorage 저장 추가)
        function login() {
            const username = document.getElementById('login-id').value;
            const password = document.getElementById('login-pw').value;

            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
				credentials: 'include',
                body: JSON.stringify({ username, password })
            })
            .then(res => res.json())
            .then(data => {
                if(data.username) {
                    localStorage.setItem('username', data.username); // [핵심] 로그인 정보 저장
                    location.reload(); 
                } else {
                    alert("정보가 틀렸습니다.");
                }
            });
        }

        // 3. 로그아웃 (localStorage 삭제 추가)
        function logout() {
            fetch('/api/logout', { method: 'POST' , credentials: 'include' }).then(() => {
                localStorage.removeItem('username'); // [핵심] 저장 정보 삭제
                location.reload();
            });
        }

        // [추가] 페이지 로드 시 로그인 상태 체크 (로그인 유지의 핵심)
        window.onload = function() {
            const savedUser = localStorage.getItem('username');
            if (savedUser) {
                document.getElementById('auth-form').style.display = 'none';
                document.getElementById('user-info').style.display = 'flex';
                document.getElementById('write-section').style.display = 'block';
                document.getElementById('welcome-msg').innerText = savedUser;
            }
            loadPosts();
        };

        // 4. 글쓰기 (FormData 사용하여 이미지 전송)
        function submitPost() {
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const fileInput = document.getElementById('image-file');

            // [핵심] 파일을 보낼 때는 FormData를 써야 합니다.
            const formData = new FormData();
            formData.append('title', title);
            formData.append('content', content);
            if(fileInput.files[0]) {
                formData.append('image', fileInput.files[0]);
            }

            fetch('/api/posts', {
                method: 'POST',
				credentials: 'include',
                body: formData // Content-Type은 브라우저가 자동으로 설정함
            })
            .then(res => {
                if(res.status === 401) return alert("세션 만료! 다시 로그인하세요.");
                if(res.ok) {
                    alert("등록되었습니다!");
                    location.reload();
                } else {
                    alert("업로드 실패 (AWS S3 인증 확인 필요)");
                }
            });
        }

        // 5. 목록 및 상세보기
	function loadPosts() {
    fetch('/api/posts')
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById('post-list');
            list.innerHTML = ''; // 기존 목록 초기화
            
            data.forEach(p => {
                // 작성자(p.author) 칸을 추가한 새로운 행 생성
                list.innerHTML += `
                <tr onclick="viewDetail(${p.id})">
                    <td>${p.id}</td>
                    <td><strong>${p.title}</strong></td>
                    <td>${p.author}</td> 
                    <td>${new Date(p.created_at).toLocaleDateString()}</td>
                </tr>`;
            });
        })
        .catch(err => console.error("데이터 로딩 실패:", err));
}


        function viewDetail(id) {
            currentPostId = id;
	    const currentUser = localStorage.getItem('username');

            fetch(`/api/posts/${id}`).then(r => r.json()).then(post => {
                document.getElementById('detail-title').innerText = post.title;
                document.getElementById('detail-date').innerText = "작성일: " + post.created_at;
                document.getElementById('detail-content').innerText = post.content;
                
                // [추가] 이미지 URL이 있으면 보여주고 없으면 숨김
                const imgTag = document.getElementById('detail-image');
                if(post.image_url) {
                    imgTag.src = post.image_url;
                    imgTag.style.display = 'block';
                } else {
                    imgTag.style.display = 'none';
                }
		const deleteBtn = document.querySelector('.btn-danger');
		if (post.author === currentUser) {
			deleteBtn.style.display = 'block';
		} else {
			deleteBtn.style.display = 'none';
		}
                document.getElementById('modal').style.display = 'block';
            });
        }

        function deletePost() {
            if(!confirm("삭제하시겠습니까?")) return;
            fetch(`/api/posts/${currentPostId}`, { method: 'DELETE' , credentials: 'include', })
            .then(res => {
                if(res.ok) { alert("삭제완료"); location.reload(); }
                else alert("삭제 권한이 없습니다.");
            });
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

	// 회원 탈퇴 함수
 	function withdrawAccount() {
    const inputPw = prompt("탈퇴를 위해 2차 비밀번호를 입력해주세요.");
    if (!inputPw) return;

    fetch('/api/withdraw', {
        method: 'DELETE',
        headers: { 
            'Content-Type': 'application/json' // [필수] 서버가 JSON임을 알게 합니다.
        },
		credentials: 'include',
        body: JSON.stringify({ withdraw_password: inputPw })
    })
    .then(res => res.json())
    .then(data => {
        if (data.message) {
            alert(data.message);
            localStorage.removeItem('username');
            location.reload();
        } else {
            alert(data.error); // "2차 비밀번호 불일치" 등의 에러 메시지 출력
        }
    })
    .catch(err => {
        console.error(err);
        alert("서버 통신 중 오류가 발생했습니다.");
    });
}

    </script>
</body>
</html>
